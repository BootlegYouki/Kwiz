name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        if: github.ref_type == 'tag'
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          echo "VERSION=$version" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Update configuration versions
        if: github.ref_type == 'tag'
        run: |
          # Update package.json
          $packageJson = Get-Content package.json | ConvertFrom-Json
          $packageJson.version = "$env:VERSION"
          $packageJson | ConvertTo-Json -Depth 100 | Set-Content package.json

          # Update tauri.conf.json
          $tauriJson = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $tauriJson.version = "$env:VERSION"
          $tauriJson | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json

          # Update Cargo.toml
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '(?m)^version\s*=\s*".*?"', "version = `"$env:VERSION`""
          Set-Content src-tauri/Cargo.toml $cargo
        shell: pwsh

      - name: Commit version updates
        if: github.ref_type == 'tag'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to $env:VERSION [skip ci]" || exit 0
          git push origin HEAD:refs/heads/main
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BootHub v__VERSION__'
          releaseBody: 'BootHub Desktop Release v__VERSION__. See assets below to install.'
          releaseDraft: false
          prerelease: false

      - name: Delete older releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


