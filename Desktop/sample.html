<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootHub Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colors matching the App's default dark mode (Classic Theme) */
            --color-primary: #ffffff;          /* Classic White accent */
            --color-background: #18181b;       /* Zinc-900 background */
            --color-card: #18181b;             /* Zinc-900 card background */
            --color-border: #52525b;           /* Zinc-600 border */
            --color-foreground: #fafafa;       /* Zinc-50 foreground text */
            --color-muted: #a1a1aa;            /* Zinc-400 muted text */
            --color-success: #22c55e;          /* Success green */
        }

        body {
            background-color: var(--color-background);
            color: var(--color-foreground);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 440px;
            position: relative;
            border: 1.5px solid var(--color-primary);
            background-color: var(--color-card);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 6px 6px 0px rgba(255, 255, 255, 0.1);
        }

        .legend {
            position: absolute;
            top: -10px;
            left: 16px;
            padding: 0 8px;
            background-color: var(--color-card);
            font-weight: bold;
            font-size: 12px;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="legend">[ Success ]</div>
        
        <div style="font-size: 13px; line-height: 1.6; text-align: center; padding: 20px 0; color: var(--color-foreground);">
            Google Drive connected successfully!<br>
            You can now close this tab and return to BootHub.
        </div>
    </div>
</body>
</html>
